<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barebones Voice</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #my-id { font-weight: bold; color: #1a73e8; background: #e8f0fe; padding: 5px; border-radius: 4px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-top: 10px; width: 80%; }
        button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #1557b0; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>Voice Chat</h2>
    <p>Your ID: <span id="my-id">Initializing...</span></p>
    
    <input type="text" id="receiver-id" placeholder="Enter Friend's ID">
    <br>
    <button onclick="startCall()">Connect Voice</button>
    
    <div class="status" id="status">Waiting for connection...</div>
</div>

<!-- Audio element to play the friend's voice -->
<audio id="remote-audio" autoplay></audio>

<!-- PeerJS Library -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
    const peer = new Peer(); 
    let localStream;

    // 1. Ask for Mic Permissions immediately
    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            localStream = stream;
            console.log("Microphone accessible");
        })
        .catch(err => {
            document.getElementById('status').innerText = "Mic Error: " + err;
        });

    // 2. Show ID when PeerJS connects to its signaling server
    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('status').innerText = "Share your ID with a friend.";
    });

    // 3. Handling Incoming Calls
    peer.on('call', call => {
        document.getElementById('status').innerText = "Incoming call...";
        call.answer(localStream); 
        call.on('stream', remoteStream => {
            document.getElementById('remote-audio').srcObject = remoteStream;
            document.getElementById('status').innerText = "Connected!";
        });
    });

    // 4. Starting a Call
    function startCall() {
        const friendId = document.getElementById('receiver-id').value;
        if (!friendId) return alert("Paste an ID first!");
        
        document.getElementById('status').innerText = "Connecting to " + friendId + "...";
        const call = peer.call(friendId, localStream);
        
        call.on('stream', remoteStream => {
            document.getElementById('remote-audio').srcObject = remoteStream;
            document.getElementById('status').innerText = "Connected!";
        });

        call.on('error', err => {
            document.getElementById('status').innerText = "Call failed: " + err;
        });
    }
</script>

</body>
</html>
