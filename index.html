<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDK Voice Chat</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #0ea5e9; --green: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: var(--card); width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; display: flex; flex-direction: column; gap: 15px; }
        
        /* Layout Split */
        .main-content { display: flex; gap: 15px; }
        .chat-area { flex: 2; }
        .user-sidebar { flex: 1; background: #0f172a; border-radius: 10px; padding: 10px; border: 1px solid #334155; }

        #chat-box { height: 180px; background: #0f172a; border-radius: 10px; overflow-y: auto; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .msg { margin-bottom: 5px; font-size: 0.85rem; border-left: 3px solid var(--accent); padding-left: 8px; }
        
        .user-item { font-size: 0.75rem; padding: 4px 8px; background: #334155; border-radius: 4px; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }

        input { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #334155; color: white; margin: 5px 0; box-sizing: border-box; outline: none; font-size: 0.9rem; }
        button { padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        
        #settings-panel { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card); border-radius: 20px; padding: 25px; box-sizing: border-box; z-index: 10; }
        .notify { position: absolute; top: 10px; right: 10px; background: var(--green); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; display: none; font-weight: bold; }
        .ping-display { font-size: 0.7rem; color: #94a3b8; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div id="new-msg-alert" class="notify">NEW MESSAGE</div>
    
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="margin:0; color:var(--accent); font-size: 1.4rem;">RDK Lobby</h2>
            <div id="ping-text" class="ping-display" style="display:none;">Ping: -- ms</div>
        </div>
        <button onclick="toggleSettings()" style="background:transparent; font-size: 1.2rem; padding:0;">⚙️</button>
    </div>

    <div id="setup">
        <input type="text" id="username" placeholder="Enter Nickname">
        <button onclick="initLobby()" style="width:100%; margin-top:10px;">Join Chat</button>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="main-content">
            <div class="chat-area">
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="message-input" placeholder="Type..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
            <div class="user-sidebar">
                <div style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 8px; font-weight: bold; text-transform: uppercase;">Active</div>
                <div id="user-list"></div>
            </div>
        </div>

        <div style="margin-top:10px; border-top: 1px solid #334155; padding-top:10px;">
            <input type="text" id="target-id" placeholder="Friend's Name">
            <button onclick="connectToFriend()" style="width:100%; background:var(--green);">Connect & Sync</button>
        </div>
        <button id="mute-btn" onclick="toggleMute()" style="width:100%; margin-top:10px; background:#64748b;">Mute Mic</button>
    </div>

    <div id="settings-panel">
        <h3>Settings</h3>
        <button onclick="toggleSettings()" style="width:100%;">Back to Chat</button>
    </div>
</div>

<div id="audio-container"></div>
<audio id="notif-sound" src="https://actions.google.com/sounds/v1/communication/notification_high_intensity.ogg"></audio>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
    let peer, rawStream, processedStream, isMuted = false, myName = "";
    let audioCtx, compressor, filter;
    let connections = {}; // Use object to track by ID
    let pingInterval;

    async function initLobby() {
        myName = document.getElementById('username').value.trim();
        if (!myName) return;

        try {
            rawStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(rawStream);
            const destination = audioCtx.createMediaStreamDestination();
            
            compressor = audioCtx.createDynamicsCompressor();
            filter = audioCtx.createBiquadFilter();
            filter.type = "highpass";
            filter.frequency.setValueAtTime(100, audioCtx.currentTime);

            source.connect(filter);
            filter.connect(compressor);
            compressor.connect(destination);
            processedStream = destination.stream;

            peer = new Peer("RDK-LOBBY-" + myName);
            peer.on('open', () => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                updateUserList();
            });

            peer.on('call', call => { call.answer(processedStream); setupVoice(call); });
            peer.on('connection', conn => setupText(conn));

        } catch (e) { alert("Mic Access Denied!"); }
    }

    function setupText(conn) {
        if(connections[conn.peer]) return;
        connections[conn.peer] = conn;
        
        document.getElementById('ping-text').style.display = 'block';
        
        conn.on('data', data => {
            if (data.type === 'ping') {
                conn.send({ type: 'pong', time: data.time });
            } else if (data.type === 'pong') {
                const rtt = Date.now() - data.time;
                document.getElementById('ping-text').innerText = `Ping: ${rtt} ms`;
            } else if (data.type === 'chat') {
                addMsg(conn.peer.replace("RDK-LOBBY-", ""), data.text);
                notifyUser();
            }
        });

        conn.on('close', () => { delete connections[conn.peer]; updateUserList(); });
        updateUserList();

        if(!pingInterval) {
            pingInterval = setInterval(() => {
                Object.values(connections).forEach(c => {
                    if (c.open) c.send({ type: 'ping', time: Date.now() });
                });
            }, 2000);
        }
    }

    function updateUserList() {
        const list = document.getElementById('user-list');
        list.innerHTML = `<div class="user-item"><span class="status-dot"></span><b>${myName} (You)</b></div>`;
        Object.keys(connections).forEach(id => {
            const cleanName = id.replace("RDK-LOBBY-", "");
            list.innerHTML += `<div class="user-item"><span class="status-dot"></span>${cleanName}</div>`;
        });
    }

    function connectToFriend() {
        const friend = document.getElementById('target-id').value.trim();
        if(!friend || friend === myName) return;
        const fullId = "RDK-LOBBY-" + friend;
        setupVoice(peer.call(fullId, processedStream));
        setupText(peer.connect(fullId));
    }

    function setupVoice(call) {
        const audio = document.createElement('audio');
        audio.autoplay = true;
        call.on('stream', s => { audio.srcObject = s; document.getElementById('audio-container').appendChild(audio); });
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        if(!input.value) return;
        const dataObj = { type: 'chat', text: input.value };
        Object.values(connections).forEach(c => c.send(dataObj));
        addMsg("You", input.value);
        input.value = "";
    }

    function addMsg(user, text) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg"><b>${user}:</b> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function toggleMute() {
        isMuted = !isMuted;
        rawStream.getAudioTracks()[0].enabled = !isMuted;
        const btn = document.getElementById('mute-btn');
        btn.innerText = isMuted ? "Unmute Mic" : "Mute Mic";
        btn.style.background = isMuted ? "#ef4444" : "#64748b";
    }

    function notifyUser() {
        document.getElementById('notif-sound').play();
        const alert = document.getElementById('new-msg-alert');
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 3000);
    }
</script>
</body>
</html>
