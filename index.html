<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDK Voice Chat Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { margin: 0 0 10px 0; color: #38bdf8; text-align: center; }
        
        #chat-box { height: 180px; background: #0f172a; border-radius: 10px; overflow-y: auto; padding: 12px; margin-bottom: 15px; border: 1px solid #334155; font-size: 0.9rem; }
        .msg { margin-bottom: 6px; }
        .msg b { color: #38bdf8; }

        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #334155; color: white; outline: none; }
        
        button { padding: 12px 20px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0ea5e9; }
        button.mute-btn { background: #64748b; width: 100%; margin-top: 10px; }
        button.mute-active { background: #ef4444; }

        .status { font-size: 0.8rem; color: #94a3b8; text-align: center; margin-bottom: 15px; }
        .credit { font-size: 0.75rem; color: #475569; text-align: center; margin-top: 20px; border-top: 1px solid #334155; padding-top: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>RDK Lobby</h2>
    <div class="status" id="status">Connecting...</div>

    <div id="setup">
        <input type="text" id="username" placeholder="Your Name">
        <button onclick="initLobby()">Join</button>
    </div>

    <div id="main-ui" style="display:none;">
        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="message-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
        
        <div style="border-top: 1px solid #334155; margin: 15px 0; padding-top: 15px;">
            <input type="text" id="target-id" placeholder="Who to call?">
            <button onclick="connectToFriend()" style="width:100%; margin-top:5px; background:#10b981;">Connect Voice</button>
        </div>

        <button id="mute-btn" class="mute-btn" onclick="toggleMute()">Mute Microphone</button>
    </div>

    <div class="credit">System by <b>RDK</b></div>
</div>

<div id="audio-container"></div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
    let peer, myStream;
    let isMuted = false;
    let connections = [];

    async function initLobby() {
        const name = document.getElementById('username').value.trim();
        if (!name) return;

        try {
            // HIGH QUALITY AUDIO CONSTRAINTS
            myStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: false, // Turned off so it doesn't compress your voice
                    sampleRate: 48000
                } 
            });

            peer = new Peer("RDK-LOBBY-" + name);

            peer.on('open', () => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('status').innerText = "Online: " + name;
            });

            peer.on('call', call => {
                call.answer(myStream);
                setupVoice(call);
            });

            peer.on('connection', conn => setupText(conn));

        } catch (e) {
            alert("Mic access denied. Check HTTPS settings.");
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        myStream.getAudioTracks()[0].enabled = !isMuted;
        
        const btn = document.getElementById('mute-btn');
        btn.innerText = isMuted ? "Unmute Microphone" : "Mute Microphone";
        btn.classList.toggle('mute-active', isMuted);
    }

    function connectToFriend() {
        const friendName = document.getElementById('target-id').value.trim();
        const fullId = "RDK-LOBBY-" + friendName;

        setupVoice(peer.call(fullId, myStream));
        setupText(peer.connect(fullId));
    }

    function setupVoice(call) {
        const audio = document.createElement('audio');
        audio.autoplay = true;
        call.on('stream', stream => {
            audio.srcObject = stream;
            document.getElementById('audio-container').appendChild(audio);
        });
    }

    function setupText(conn) {
        if(connections.find(c => c.peer === conn.peer)) return;
        connections.push(conn);
        conn.on('data', data => addMsg(conn.peer.replace("RDK-LOBBY-", ""), data));
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        if (!input.value) return;
        connections.forEach(conn => conn.send(input.value));
        addMsg("You", input.value);
        input.value = "";
    }

    function addMsg(user, text) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg"><b>${user}:</b> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
